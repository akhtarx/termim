name: Release

on:
  push:
    tags:
      - 'v*' # Trigger build on version tags like v1.0.7

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            name_os: linux
            name_arch: x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            name_os: windows
            name_arch: x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            name_os: macos
            name_arch: x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            name_os: macos
            name_arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          BINARY_NAME="termim-${{ matrix.name_os }}-${{ matrix.name_arch }}${{ matrix.suffix }}"
          cp target/${{ matrix.target }}/release/termim${{ matrix.suffix }} $BINARY_NAME
          echo "BINARY_PATH=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.BINARY_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
